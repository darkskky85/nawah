name: تحديث أخبار الذكاء الاصطناعي

# يعمل تلقائياً كل 6 ساعات، ويمكن تشغيله يدوياً من تبويب Actions
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: جلب المستودع
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: تشغيل سكربت الأخبار
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: حفظ التحديث ودفعه
        run: |
          git config user.name "nawah-news-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain assets/news-data.js scripts/news-seen.json)" ]; then
            git add assets/news-data.js scripts/news-seen.json
            git commit -m "تحديث الأخبار تلقائياً: $(date -u +%Y-%m-%d' '%H:%M' UTC')"
            # زامن مع أحدث نسخة على المستودع قبل الدفع لتجنّب التعارض، مع إعادة المحاولة
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "محاولة الدفع $i فشلت، إعادة المزامنة…"
              sleep 5
            done
          else
            echo "لا تغيير في الأخبار."
          fi
