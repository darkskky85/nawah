name: تحديث أخبار الذكاء الاصطناعي

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: جلب المستودع
        uses: actions/checkout@v4

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: تشغيل سكربت الأخبار
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: حفظ التحديث ودفعه
        run: |
          git config user.name "nawah-news-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain assets/news-data.js scripts/news-seen.json)" ]; then
            git add assets/news-data.js scripts/news-seen.json
            git commit -m "news update"
            git pull --rebase --autostash origin main
            git push
          else
            echo "no change"
          fi
